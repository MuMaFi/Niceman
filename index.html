<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Cutter</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #111; color: #eee; padding: 16px; font-size: 13px; }
h1 { font-size: 16px; margin-bottom: 16px; }
.sec { margin-bottom: 14px; }
label { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; }
input[type="file"] { width: 100%; background: #222; color: #eee; border: 1px solid #444; padding: 6px; font-family: monospace; font-size: 11px; }
input[type="range"] { width: 100%; }
select { width: 100%; background: #222; color: #eee; border: 1px solid #444; padding: 6px; font-family: monospace; }
button { background: #333; color: #fff; border: 1px solid #555; padding: 10px; font-family: monospace; font-size: 13px; cursor: pointer; width: 100%; margin-top: 6px; }
button:hover:not(:disabled) { background: #555; }
button:disabled { color: #555; cursor: not-allowed; }
button.primary { background: #1a3a1a; border-color: #3a7a3a; color: #8f8; }
button.primary:hover:not(:disabled) { background: #2a5a2a; }
#log { background: #0a0a0a; border: 1px solid #333; padding: 10px; font-size: 11px; min-height: 80px; max-height: 200px; overflow-y: auto; color: #8f8; white-space: pre-wrap; margin-top: 8px; }
#log .err { color: #f88; }
#log .info { color: #88f; }
video, audio { width: 100%; margin-top: 6px; display: none; }
.status { font-size: 10px; color: #fa0; margin-top: 3px; }
hr { border: none; border-top: 1px solid #333; margin: 14px 0; }
#downloadArea { display: none; margin-top: 10px; }
#downloadArea a { display: block; background: #1a3a1a; border: 1px solid #3a7a3a; color: #8f8; text-align: center; padding: 12px; text-decoration: none; font-family: monospace; }
.row { display: flex; gap: 8px; }
.row .sec { flex: 1; }
progress { width: 100%; height: 8px; margin-top: 6px; display: none; }
</style>
</head>
<body>
<h1>🎬 Video Cutter – Prototyp</h1>

<div class="sec">
  <label>VIDEO</label>
  <input type="file" id="videoInput" accept="video/*">
  <video id="videoPreview" controls></video>
  <div class="status" id="videoStatus"></div>
</div>

<div class="row">
  <div class="sec">
    <label>SONG 1 – Dramatisch</label>
    <input type="file" id="song1Input" accept="audio/*">
    <audio id="audio1Preview" controls></audio>
    <div class="status" id="song1Status"></div>
  </div>
  <div class="sec">
    <label>SONG 2 – Ruhig</label>
    <input type="file" id="song2Input" accept="audio/*">
    <audio id="audio2Preview" controls></audio>
    <div class="status" id="song2Status"></div>
  </div>
</div>

<div class="sec">
  <label>STILLE-SCHWELLE (Lautstärke unter der geschnitten wird): <span id="silenceVal">-35</span> dB</label>
  <input type="range" id="silenceThresh" min="-60" max="-10" value="-35" oninput="document.getElementById('silenceVal').textContent=this.value">
</div>

<div class="sec">
  <label>MINDEST-STILLE zum Schneiden: <span id="silenceDurVal">0.5</span>s</label>
  <input type="range" id="silenceDur" min="0.1" max="2" step="0.1" value="0.5" oninput="document.getElementById('silenceDurVal').textContent=this.value">
</div>

<hr>

<button class="primary" id="analyzeBtn" onclick="analyze()">▶ ANALYSIEREN + SCHNEIDEN</button>
<progress id="prog"></progress>

<div id="log">Bereit. Video + Songs hochladen, dann Analysieren drücken.</div>

<div id="downloadArea">
  <a id="downloadLink" href="#" download="output.mp4">⬇ FERTIGES VIDEO HERUNTERLADEN</a>
</div>

<script>
// FFmpeg.wasm laden
const FFMPEG_CDN = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js';
const FFMPEG_CORE = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js';

let videoFile = null, song1File = null, song2File = null;
let ffmpeg = null;

function log(msg, type='') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = type;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setFile(inputId, previewId, statusId, varName) {
  document.getElementById(inputId).addEventListener('change', function(e) {
    const f = e.target.files[0];
    if (!f) return;
    window[varName] = f;
    const url = URL.createObjectURL(f);
    const el = document.getElementById(previewId);
    el.src = url;
    el.style.display = 'block';
    document.getElementById(statusId).textContent = `✓ ${f.name} (${(f.size/1024/1024).toFixed(1)} MB)`;
  });
}

setFile('videoInput','videoPreview','videoStatus','videoFile');
setFile('song1Input','audio1Preview','song1Status','song1File');
setFile('song2Input','audio2Preview','song2Status','song2File');

// Audio analysieren: Lautstärke-Map erstellen
async function analyzeAudio(file) {
  log('Analysiere Audio-Lautstärke...', 'info');
  const ctx = new AudioContext();
  const buf = await file.arrayBuffer();
  const decoded = await ctx.decodeAudioData(buf);
  const data = decoded.getChannelData(0);
  const sr = decoded.sampleRate;
  const frameSize = Math.floor(sr * 0.05); // 50ms frames
  const rms = [];
  for (let i = 0; i < data.length; i += frameSize) {
    const frame = data.slice(i, i + frameSize);
    const sum = frame.reduce((a, b) => a + b * b, 0);
    const r = Math.sqrt(sum / frame.length);
    rms.push(r);
  }
  await ctx.close();
  return { rms, frameSize, sr, duration: decoded.duration };
}

function rmsToDb(r) {
  return r > 0 ? 20 * Math.log10(r) : -100;
}

// Stille-Segmente finden
function findSilentSegments(rms, frameSize, sr, threshDb, minDurS) {
  const minFrames = Math.ceil(minDurS / 0.05);
  let silent = [];
  let start = null;
  for (let i = 0; i < rms.length; i++) {
    const db = rmsToDb(rms[i]);
    if (db < threshDb) {
      if (start === null) start = i;
    } else {
      if (start !== null && (i - start) >= minFrames) {
        silent.push({ start: start * 0.05, end: i * 0.05 });
      }
      start = null;
    }
  }
  return silent;
}

// Aktive Segmente (nicht Stille)
function getActiveSegments(silentSegs, totalDur) {
  let active = [];
  let cur = 0;
  for (const s of silentSegs) {
    if (s.start - cur > 0.1) active.push({ start: cur, end: s.start });
    cur = s.end;
  }
  if (totalDur - cur > 0.1) active.push({ start: cur, end: totalDur });
  return active;
}

// Durchschnittliche Lautstärke eines Segments
function segmentAvgDb(rms, startS, endS) {
  const startF = Math.floor(startS / 0.05);
  const endF = Math.ceil(endS / 0.05);
  const slice = rms.slice(startF, endF);
  if (!slice.length) return -60;
  const avg = slice.reduce((a, b) => a + b, 0) / slice.length;
  return rmsToDb(avg);
}

async function loadFFmpeg() {
  if (ffmpeg) return ffmpeg;
  log('Lade FFmpeg (einmalig, ~30MB)...', 'info');
  
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = FFMPEG_CDN;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
  
  const { FFmpeg } = window.FFmpegWASM || window;
  ffmpeg = new FFmpeg();
  ffmpeg.on('log', ({ message }) => {
    if (message.includes('Error') || message.includes('error')) log(message, 'err');
  });
  ffmpeg.on('progress', ({ progress }) => {
    document.getElementById('prog').value = progress;
  });
  
  await ffmpeg.load({ coreURL: FFMPEG_CORE });
  log('FFmpeg geladen ✓');
  return ffmpeg;
}

async function analyze() {
  if (!videoFile) { log('❌ Kein Video!', 'err'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Läuft...';
  document.getElementById('prog').style.display = 'block';
  document.getElementById('prog').value = 0;
  document.getElementById('downloadArea').style.display = 'none';

  try {
    const threshDb = parseFloat(document.getElementById('silenceThresh').value);
    const minDur = parseFloat(document.getElementById('silenceDur').value);

    // 1. Audio analysieren
    const { rms, frameSize, sr, duration } = await analyzeAudio(videoFile);
    log(`Video-Dauer: ${duration.toFixed(1)}s`, 'info');

    // 2. Stille finden
    const silentSegs = findSilentSegments(rms, frameSize, sr, threshDb, minDur);
    log(`${silentSegs.length} Stille-Segmente gefunden`);

    // 3. Aktive Segmente
    const activeSegs = getActiveSegments(silentSegs, duration);
    log(`${activeSegs.length} aktive Segmente`);

    if (activeSegs.length === 0) {
      log('❌ Keine aktiven Segmente – Schwelle zu streng?', 'err');
      btn.disabled = false; btn.textContent = '▶ ANALYSIEREN + SCHNEIDEN';
      return;
    }

    // 4. Lautstärke pro Segment → dramatisch/ruhig klassifizieren
    const dbValues = activeSegs.map(s => segmentAvgDb(rms, s.start, s.end));
    const avgDb = dbValues.reduce((a,b)=>a+b,0)/dbValues.length;
    log(`Durchschnittliche Lautstärke: ${avgDb.toFixed(1)} dB`);

    const classified = activeSegs.map((s, i) => ({
      ...s,
      db: dbValues[i],
      dramatic: dbValues[i] > avgDb
    }));

    const dramaticCount = classified.filter(s=>s.dramatic).length;
    log(`Dramatisch: ${dramaticCount} | Ruhig: ${classified.length - dramaticCount}`);

    // 5. FFmpeg laden
    const ff = await loadFFmpeg();
    const { fetchFile } = window.FFmpegWASM || window;

    // Dateien in FFmpeg schreiben
    log('Lade Dateien in FFmpeg...', 'info');
    ff.writeFile('input.mp4', await fetchFile(videoFile));
    if (song1File) ff.writeFile('song1.mp3', await fetchFile(song1File));
    if (song2File) ff.writeFile('song2.mp3', await fetchFile(song2File));

    // 6. Jeden Clip schneiden
    log('Schneide Clips...', 'info');
    const clipFiles = [];
    for (let i = 0; i < classified.length; i++) {
      const seg = classified[i];
      const fname = `clip${i}.mp4`;
      const dur = seg.end - seg.start;
      await ff.exec([
        '-ss', seg.start.toFixed(3),
        '-i', 'input.mp4',
        '-t', dur.toFixed(3),
        '-c', 'copy',
        fname
      ]);
      clipFiles.push(fname);
      log(`Clip ${i+1}/${classified.length}: ${seg.start.toFixed(1)}s–${seg.end.toFixed(1)}s (${seg.dramatic?'🔴 dramatisch':'🔵 ruhig'})`);
      document.getElementById('prog').value = (i+1)/classified.length * 0.5;
    }

    // 7. Concat-Liste erstellen
    const concatList = clipFiles.map(f => `file '${f}'`).join('\n');
    ff.writeFile('concat.txt', concatList);

    // 8. Zusammenführen
    log('Führe Clips zusammen...', 'info');
    await ff.exec([
      '-f', 'concat',
      '-safe', '0',
      '-i', 'concat.txt',
      '-c', 'copy',
      'merged.mp4'
    ]);
    document.getElementById('prog').value = 0.7;

    // 9. Musik mixen (wenn Songs vorhanden)
    let finalFile = 'merged.mp4';
    if (song1File || song2File) {
      log('Mische Musik...', 'info');
      const musicSrc = song1File ? 'song1.mp3' : 'song2.mp3';
      await ff.exec([
        '-i', 'merged.mp4',
        '-i', musicSrc,
        '-filter_complex', '[0:a][1:a]amix=inputs=2:duration=first:weights=1 0.4[aout]',
        '-map', '0:v',
        '-map', '[aout]',
        '-c:v', 'copy',
        '-c:a', 'aac',
        '-shortest',
        'output.mp4'
      ]);
      finalFile = 'output.mp4';
    }
    document.getElementById('prog').value = 0.95;

    // 10. Download
    log('Fertig! Erstelle Download...', 'info');
    const data = ff.readFile(finalFile);
    const blob = new Blob([data.buffer], { type: 'video/mp4' });
    const url = URL.createObjectURL(blob);
    const dl = document.getElementById('downloadLink');
    dl.href = url;
    dl.download = 'geschnitten.mp4';
    document.getElementById('downloadArea').style.display = 'block';
    document.getElementById('prog').value = 1;
    log('✅ Video fertig – Download-Button erschienen!');

  } catch(e) {
    log(`❌ Fehler: ${e.message}`, 'err');
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = '▶ ANALYSIEREN + SCHNEIDEN';
}
</script>
</body>
</html>
